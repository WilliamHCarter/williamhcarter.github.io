<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 200" width="800" height="500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A room stages itself">
            <rect width="320" height="200" fill="#fcfdfe"/>
            <line x1="60" y1="150" x2="280" y2="150" stroke="#e2e7ec" stroke-width="2.5" stroke-linecap="round"/>

            <!-- rug -->
            <rect x="84" y="147" width="150" height="7" rx="3.5" fill="#dce6f0" opacity="0">
              <animate attributeName="opacity" dur="4.9s" repeatCount="indefinite" keyTimes="0;0.0257;0.0857;1" values="0;0;1;1"/>
            </rect>

            <!-- sofa slides in from the left -->
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.0429;0.1543;0.1971;1" keySplines="0 0 1 1;0.42 0 0.58 1;0.3 0 0.5 1;0 0 1 1" values="-290 0;-290 0;7 0;0 0;0 0"/>
              <rect x="98" y="104" width="74" height="20" rx="5" fill="#5F92CC"/>
              <rect x="98" y="120" width="74" height="16" rx="4" fill="#4976aa"/>
              <rect x="90" y="110" width="12" height="26" rx="5" fill="#4976aa"/>
              <rect x="168" y="110" width="12" height="26" rx="5" fill="#4976aa"/>
              <rect x="100" y="136" width="6" height="14" fill="#3a5f88"/>
              <rect x="164" y="136" width="6" height="14" fill="#3a5f88"/>
            </g>

            <!-- side table rises from below -->
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.12;0.2057;0.24;1" keySplines="0 0 1 1;0.42 0 0.58 1;0.3 0 0.5 1;0 0 1 1" values="0 100;0 100;0 -5;0 0;0 0"/>
              <rect x="192" y="128" width="34" height="5" rx="2.5" fill="#c9a87c"/>
              <rect x="207" y="133" width="4" height="17" fill="#b3915f"/>
            </g>

            <!-- lamp drops onto the table -->
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.1714;0.2657;0.2829;1" keySplines="0 0 1 1;0.42 0 0.58 1;0.5 0 0.5 1;0 0 1 1" values="0 -150;0 -150;0 5;0 0;0 0"/>
              <rect x="208" y="106" width="2.5" height="22" fill="#b3915f"/>
              <path d="M198,96 h22 l-5,14 h-12 z" fill="#d6b189"/>
            </g>
            <circle cx="209" cy="104" r="15" fill="#ffe9b8" opacity="0">
              <animate attributeName="opacity" dur="4.9s" repeatCount="indefinite" keyTimes="0;0.48;0.5143;1" values="0;0;0.35;0.35"/>
            </circle>

            <!-- wall art drops from above and straightens -->
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.2229;0.3086;1" keySplines="0 0 1 1;0.3 0 0.45 1;0 0 1 1" values="0 -130;0 -130;0 0;0 0"/>
              <rect x="108" y="62" width="24" height="30" fill="#e8eef5" stroke="#5F92CC" stroke-width="2.5">
                <animateTransform attributeName="transform" type="rotate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                  keyTimes="0;0.2229;0.3429;1" keySplines="0 0 1 1;0.3 0 0.45 1;0 0 1 1" values="-9 120 62;-9 120 62;0 120 62;0 120 62"/>
              </rect>
            </g>
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.2571;0.3429;1" keySplines="0 0 1 1;0.3 0 0.45 1;0 0 1 1" values="0 -130;0 -130;0 0;0 0"/>
              <rect x="142" y="68" width="28" height="22" fill="#e8eef5" stroke="#5F92CC" stroke-width="2.5">
                <animateTransform attributeName="transform" type="rotate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                  keyTimes="0;0.2571;0.3771;1" keySplines="0 0 1 1;0.3 0 0.45 1;0 0 1 1" values="8 156 68;8 156 68;0 156 68;0 156 68"/>
              </rect>
            </g>

            <!-- plant rises, then leaves unfurl -->
            <g>
              <animateTransform attributeName="transform" type="translate" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                keyTimes="0;0.3086;0.3943;1" keySplines="0 0 1 1;0.25 0.1 0.3 1;0 0 1 1" values="0 80;0 80;0 0;0 0"/>
              <rect x="250" y="136" width="18" height="14" rx="2" fill="#b98d6e"/>
              <g transform="translate(259,136)">
                <g transform="scale(0)">
                  <animateTransform attributeName="transform" type="scale" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                    keyTimes="0;0.3771;0.4286;0.4457;1" keySplines="0 0 1 1;0.33 0 0.45 1;0.5 0 0.5 1;0 0 1 1" values="0;0;1.1;1;1"/>
                  <ellipse cx="0" cy="-16" rx="4" ry="11" fill="#7fa08a"/>
                  <ellipse cx="0" cy="-16" rx="4" ry="11" fill="#7fa08a" transform="rotate(40)"/>
                  <ellipse cx="0" cy="-16" rx="4" ry="11" fill="#8fae98" transform="rotate(-40)"/>
                </g>
              </g>
            </g>

            <!-- accent cushion pops onto the sofa -->
            <g transform="translate(154,120)">
              <g transform="scale(0)">
                <animateTransform attributeName="transform" type="scale" dur="4.9s" repeatCount="indefinite" calcMode="spline"
                  keyTimes="0;0.4114;0.4543;0.4714;1" keySplines="0 0 1 1;0.33 0 0.45 1;0.5 0 0.5 1;0 0 1 1" values="0;0;1.15;1;1"/>
                <rect x="-7" y="-14" width="14" height="14" rx="3" fill="#54a1f8" transform="rotate(-12)"/>
              </g>
            </g>

            <g opacity="0">
              <animate attributeName="opacity" dur="4.9s" repeatCount="indefinite" keyTimes="0;0.48;0.66;1" values="0;0;1;1"/>
              <text x="160" y="167" text-anchor="middle" fill="#4976aa" style="font: 600 13px system-ui, -apple-system, sans-serif;">Moving Homes Together</text>
              <text x="160" y="180" text-anchor="middle" fill="#98a2ac" style="font: 500 6.5px system-ui, -apple-system, sans-serif; letter-spacing: 1.4px;">MOVING | ORGANIZING | DESIGN</text>
            </g>

            <rect width="320" height="200" fill="#fcfdfe" opacity="0">
              <animate attributeName="opacity" dur="4.9s" repeatCount="indefinite" keyTimes="0;0.928;0.98;1" values="0;0;1;1"/>
            </rect>
          </svg>

name: Deploy current site and archive

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build current site
        run: npm run build -- --outDir .site

      - name: Fetch published archive releases
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin archive-static >/dev/null; then
            git fetch --depth=1 origin archive-static
            git worktree add --detach .archive-static FETCH_HEAD
          else
            echo "No archive-static branch exists yet."
          fi

          node scripts/stage-archives.mjs .archive-static .site/archive src/data/archive-releases.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
